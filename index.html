<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>8 Марта — Впечатление</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --heart-red: #ff1a1a;
            --neon-pink: #ff3385;
            --light-pink: #ff99cc;
            --glow: 0 0 15px rgba(255, 51, 133, 0.8), 0 0 30px rgba(255, 51, 133, 0.4);
        }

        body {
            margin: 0;
            background: radial-gradient(circle, #1a0a1a 0%, #000 100%);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            cursor: pointer;
        }

        .ui-layer {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        h1 { 
            font-size: 2.5rem; 
            text-shadow: 0 0 20px var(--heart-red); 
            margin: 0; 
            opacity: 0.9;
        }

        /* Контейнер для Сердца и 8 */
        .art-container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #heart-canvas {
            position: absolute;
            filter: drop-shadow(0 0 15px var(--heart-red));
        }

        /* Композиция внутри сердца */
        .march-content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -30px; /* Центрируем визуально в сердце */
            animation: pulse-all 2s infinite ease-in-out;
        }

        /* Восьмерка */
        .eight-css {
            position: relative;
            width: 80px;
            height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .circle {
            border: 8px solid var(--neon-pink);
            border-radius: 50%;
            box-shadow: var(--glow), inset var(--glow);
            position: absolute;
        }

        .top { width: 50px; height: 50px; top: 0; }
        .bottom { width: 70px; height: 70px; bottom: 0; }

        /* Слово МАРТА */
        .marta-text {
            margin-top: 10px;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: var(--glow);
            font-family: 'Segoe UI', sans-serif;
        }

        @keyframes pulse-all {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }

        .hint {
            position: fixed;
            bottom: 20px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="ui-layer">
        <h1>Ты сможешь так же</h1>
        
        <div class="art-container">
            <canvas id="heart-canvas"></canvas>
            
            <div class="march-content">
                <div class="eight-css">
                    <div class="circle top"></div>
                    <div class="circle bottom"></div>
                </div>
                <div class="marta-text">Марта</div>
            </div>
        </div>
    </div>
    
    <div class="hint">Кликни для салюта...</div>

    <script>
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500;
        canvas.height = 500;

        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 12, y: -y * 12 }; 
        }

        let particles = [];
        for (let i = 0; i < 200; i++) {
            particles.push({ t: Math.random() * Math.PI * 2, size: Math.random() * 2 + 1 });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff1a1a';
            const time = Date.now() * 0.002;
            const pulse = 1 + Math.sin(time * 2) * 0.08;

            particles.forEach(p => {
                const pos = getHeartPoint(p.t);
                const x = pos.x * pulse + canvas.width / 2;
                const y = pos.y * pulse + canvas.height / 2;
                
                ctx.beginPath();
                ctx.arc(x, y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        document.body.addEventListener('click', (e) => {
            const colors = ['#ff3385', '#ff1a1a', '#ffffff', '#ff99cc'];
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
                colors: colors
            });
        });
    </script>
</body>
</html>
</body>
</html>
