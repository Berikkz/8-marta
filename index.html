<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>

    <meta property="og:title" content="С праздником весны! ✨">
    <meta property="og:description" content="Интерактивный подарок. Нажми, чтобы открыть!">
    <meta property="og:image" content="preview-8march.jpg"> 
    <meta property="og:type" content="website">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --heart-red: #ff1a1a;
            --neon-pink: #ff3385;
            --glow: 0 0 15px rgba(255, 51, 133, 0.8), 0 0 30px rgba(255, 51, 133, 0.4);
        }

        body {
            margin: 0;
            background: #000;
            background: radial-gradient(circle, #1a0a1a 0%, #000 100%);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            cursor: pointer;
        }

        .ui-layer {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 2.5rem; text-shadow: 0 0 20px var(--heart-red); margin: 0; }
        p { font-size: 1.1rem; opacity: 0.6; margin: 10px 0; }

        .art-container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #heart-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            filter: drop-shadow(0 0 10px var(--heart-red));
        }

        /* Блок 8 Марта */
        .march-content {
            position: relative;
            z-index: 20; /* Поверх всего */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -40px; 
            animation: pulse-all 2s infinite ease-in-out;
            pointer-events: none;
        }

        .eight-css {
            position: relative;
            width: 80px;
            height: 130px;
            margin-bottom: 10px;
        }

        .circle {
            border: 8px solid var(--neon-pink);
            border-radius: 50%;
            box-shadow: var(--glow), inset var(--glow);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .top { width: 50px; height: 50px; top: 0; }
        .bottom { width: 75px; height: 75px; bottom: 0; }

        .marta-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: var(--glow);
        }

        @keyframes pulse-all {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3); }
        }

        .hint { position: fixed; bottom: 30px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <h1>С праздником весны!</h1>
        <p>Сияй, вдохновляй, создавай...</p>
        
        <div class="art-container">
            <canvas id="heart-canvas"></canvas>
            
            <div class="march-content">
                <div class="eight-css">
                    <div class="circle top"></div>
                    <div class="circle bottom"></div>
                </div>
                <div class="marta-text">Марта</div>
            </div>
        </div>
    </div>
    
    <div class="hint">НАЖМИ НА ЭКРАН</div>

    <script>
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500;
        canvas.height = 500;

        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 12, y: -y * 12 }; 
        }

        let particles = [];
        for (let i = 0; i < 200; i++) {
            particles.push({ t: Math.random() * Math.PI * 2, size: Math.random() * 2 + 1 });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff1a1a';
            const time = Date.now() * 0.002;
            const pulse = 1 + Math.sin(time * 2) * 0.08;

            particles.forEach(p => {
                const pos = getHeartPoint(p.t);
                const x = pos.x * pulse + canvas.width / 2;
                const y = pos.y * pulse + canvas.height / 2;
                ctx.beginPath();
                ctx.arc(x, y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        document.body.addEventListener('click', (e) => {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
                colors: ['#ff3385', '#ff1a1a', '#ffffff', '#ff99cc']
            });
        });
    </script>
</body>
</html>
